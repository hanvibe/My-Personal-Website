<!DOCTYPE html>
<html lang="en">
    <head>

        <title>Contact Me</title>
        <link rel="stylesheet" href="styleforindex.css"/>
        <link rel="stylesheet" href="styleforabout.css"/>
        <link rel="stylesheet" href="styleforcontact.css"/>

    </head>

    <body>

        <header>

            <h2 class="logo">Han Thu</h2>

            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="portfolio.html">Portfolio</a>
                <a href="contact.html">Contact</a>
            </nav>

        </header>

        <main>

            <section class="page-title">
                <h1>Contact Me</h1>
                <p>Let's connect and work together.</p>
            </section>

            <section class="contact-section">

                <div class="contact-info">
                    <h2>Contact Information</h2>
                    <p>Email: hanthu@example.com</p>
                    <p>GitHub: github.com/hanthu</p>
                    <p>Location: Virginia, USA</p>
                </div>

                <form class="contact-form">

                    <h2>Send Me a Message</h2>

                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your name"/>

                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email"/>

                    <label for="message">Message</label>
                    <textarea id="Message" placeholder="Write your Message"></textarea>

                    <button type="submit">Send Message</button>
                </form>

            </section>
        </main>

        <footer>
            <p>@ 2026 Han Thu.</p>
        </footer>

    </body>
</html>
